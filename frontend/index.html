<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Draw</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>AI Voice Draw</h1>
            <div class="status" id="status">Ready</div>
        </header>
        
        <main class="app-main">
            <div class="canvas-wrapper">
                <canvas id="fabric-canvas" width="800" height="600"></canvas>
            </div>
            
            <aside class="sidebar">
                <div class="voice-controls">
                    <button id="btn-record" class="btn-record">
                        <span class="mic-icon">🎤</span>
                        <span class="btn-text">Start Recording</span>
                    </button>
                    <div class="transcript" id="transcript"></div>
                </div>
                
                <div class="chat-log" id="chat-log">
                    <div class="chat-message system">
                        <p>Say "draw a circle" or "画一个笑脸" to start!</p>
                    </div>
                </div>
                
                <div class="settings">
                    <label>
                        API Key:
                        <input type="password" id="api-key" placeholder="sk-...">
                    </label>
                    <label>
                        Provider:
                        <select id="provider">
                            <option value="openai">OpenAI</option>
                            <option value="claude">Claude</option>
                        </select>
                    </label>
                </div>
            </aside>
        </main>
        
        <footer class="app-footer">
            <button id="btn-undo">Undo</button>
            <button id="btn-redo">Redo</button>
            <button id="btn-clear">Clear</button>
        </footer>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="/static/js/canvas.js"></script>
    <script src="/static/js/speech.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
